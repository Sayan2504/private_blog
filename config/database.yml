# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: private_blog_development
  # For local: uses Unix socket (no host/port needed)
  # For external DB, set DATABASE_URL env var instead

test:
  <<: *default
  database: private_blog_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    database: private_blog_production
    username: private_blog
    password: <%= ENV["PRIVATE_BLOG_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: private_blog_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: private_blog_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: private_blog_production_cable
    migrations_paths: db/cable_migrate
